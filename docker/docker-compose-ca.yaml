version: '3.7'

networks:
  voltride:

services:

  ca_voltride:
    image: hyperledger/fabric-ca:latest
    container_name: ca_voltride
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-voltride
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/voltride:/etc/hyperledger/fabric-ca-server
    networks:
      - voltride

  ca_battery:
    image: hyperledger/fabric-ca:latest
    container_name: ca_battery
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-battery
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/battery:/etc/hyperledger/fabric-ca-server
    networks:
      - voltride

  ca_motor:
    image: hyperledger/fabric-ca:latest
    container_name: ca_motor
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-motor
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
    ports:
      - "9054:9054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/motor:/etc/hyperledger/fabric-ca-server
    networks:
      - voltride

  ca_chassis:
    image: hyperledger/fabric-ca:latest
    container_name: ca_chassis
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-chassis
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=10054
    ports:
      - "10054:10054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/fabric-ca/chassis:/etc/hyperledger/fabric-ca-server
    networks:
      - voltride

  ca_orderer:
    image: hyperledger/fabric-ca:latest
    container_name: ca_orderer
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
