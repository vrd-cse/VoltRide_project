version: '3.7'

networks:
  voltride:

services:

  orderer0.example.com:
    container_name: orderer0.example.com
    hostname: orderer0.example.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    ports:
      - 7050:7050
      - 7053:7053
    volumes:
      - ../organizations/ordererOrganizations/example.com/orderers/orderer0.example.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/example.com/orderers/orderer0.example.com/tls:/var/hyperledger/orderer/tls
      - ../configtx/system-genesis-block/genesis.block:/etc/hyperledger/fabric/genesisblock
      - ../ledger/orderer0:/var/hyperledger/production
    networks:
      - voltride

  peer0.battery.example.com:
    container_name: peer0.battery.example.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_PEER_ID=peer0.battery.example.com
      - CORE_PEER_ADDRESS=peer0.battery.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.battery.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.battery.example.com:7051
      - CORE_PEER_LOCALMSPID=BatteryMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_PEER_CHAINCODEADDRESS=peer0.battery.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
    working_dir: /root
    command: peer node start
    ports:
      - 7051:7051
      - 7052:7052
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/battery.example.com/peers/peer0.battery.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/battery.example.com/peers/peer0.battery.example.com/tls:/etc/hyperledger/fabric/tls
      - ../ledger/peer0.battery:/var/hyperledger/production
    networks:
      - voltride

    extra_hosts:
      - "peer0.battery.example.com:host-gateway"

  peer0.motor.example.com:
    container_name: peer0.motor.example.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_PEER_ID=peer0.motor.example.com
      - CORE_PEER_ADDRESS=peer0.motor.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.motor.example.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.motor.example.com:9051
      - CORE_PEER_LOCALMSPID=MotorMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_PEER_CHAINCODEADDRESS=peer0.motor.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
    working_dir: /root
    command: peer node start
    ports:
      - 9051:9051
      - 9052:9052
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/motor.example.com/peers/peer0.motor.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/motor.example.com/peers/peer0.motor.example.com/tls:/etc/hyperledger/fabric/tls
      - ../ledger/peer0.motor:/var/hyperledger/production
    networks:
      - voltride
    extra_hosts:
      - "peer0.motor.example.com:host-gateway"


