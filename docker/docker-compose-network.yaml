      - ../organizations/peerOrganizations/voltride.example.com/peers/peermotor.voltride.example.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/voltride.example.com/peers/peermotor.voltride.example.com/tls:/etc/hyperledger/fabric/tls
